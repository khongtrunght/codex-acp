name: Publish and Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [release-please]
    if: ${{ needs.release-please.outputs.release_created }}
    permissions:
      contents: read
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            artifact: codex-acp-bridge
            archive: codex-acp-bridge-linux-x64.tar.gz
          - target: bun-linux-arm64
            artifact: codex-acp-bridge
            archive: codex-acp-bridge-linux-arm64.tar.gz
          - target: bun-darwin-x64
            artifact: codex-acp-bridge
            archive: codex-acp-bridge-darwin-x64.zip
          - target: bun-darwin-arm64
            artifact: codex-acp-bridge
            archive: codex-acp-bridge-darwin-arm64.zip
          - target: bun-windows-x64
            artifact: codex-acp-bridge.exe
            archive: codex-acp-bridge-windows-x64.zip

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          bun build src/index.ts \
            --compile \
            --minify \
            --sourcemap \
            --target ${{ matrix.target }} \
            --outfile ${{ matrix.artifact }}

      - name: Compress binary
        run: |
          if [[ "${{ matrix.archive }}" == *.zip ]]; then
            zip ${{ matrix.archive }} ${{ matrix.artifact }}
          else
            tar czf ${{ matrix.archive }} ${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Upload binaries to GitHub Release
    runs-on: ubuntu-latest
    needs: [release-please, build-binaries]
    if: ${{ needs.release-please.outputs.release_created }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Upload artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload \
            "${{ needs.release-please.outputs.tag_name }}" \
            artifacts/* \
            --clobber
